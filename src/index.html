<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mouse Pointer Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- Title bar (draggable) -->
    <div class="titlebar" id="drag-region">
      <div class="titlebar-left">
        <span class="app-icon">🖱️</span>
        <span class="app-title">Mouse Pointer Settings</span>
      </div>
      <button class="close-btn" id="close-btn" title="Close">✕</button>
    </div>

    <!-- Preset grid -->
    <section class="section">
      <h2 class="section-label">Presets</h2>
      <div class="preset-grid" id="preset-grid">
        <!-- Populated by renderer.js -->
      </div>
    </section>

    <div class="divider"></div>

    <!-- Custom picker -->
    <section class="section">
      <h2 class="section-label">Custom</h2>

      <!-- Shape picker -->
      <div class="custom-row">
        <label class="field-label">Shape</label>
        <div class="shape-grid" id="shape-grid">
          <!-- Populated by renderer.js -->
        </div>
      </div>

      <div class="custom-row">
        <label class="field-label" for="color-input">Color</label>
        <div class="color-row">
          <input type="color" id="color-input" value="#00ff66" />
          <input type="text" id="color-hex" class="hex-input" value="#00ff66" maxlength="7" spellcheck="false" />
        </div>
      </div>

      <div class="custom-row">
        <label class="field-label" for="size-slider">
          Size
          <span class="size-value" id="size-display">48px</span>
        </label>
        <input type="range" id="size-slider" min="24" max="256" value="48" step="4" class="slider" />
        <div class="size-ticks">
          <span>24</span>
          <span>64</span>
          <span>128</span>
          <span>256</span>
        </div>
      </div>

      <div class="preview-row">
        <div class="cursor-preview" id="cursor-preview">
          <svg id="shape-svg" viewBox="0 0 32 32" width="32" height="32"></svg>
        </div>
        <span class="preview-label" id="preview-label">Arrow • 48px</span>
      </div>

      <button class="apply-btn" id="apply-btn">Apply Custom</button>
    </section>

    <div class="divider"></div>

    <!-- Reset + status -->
    <section class="section bottom-section">
      <button class="reset-btn" id="reset-btn">↺ Reset to Windows Default</button>
      <div class="status-bar" id="status-bar">Ready</div>
    </section>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
